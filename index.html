<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动挑战助手</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
    background: #F0F9F1;
    color: #2A2E3A;
}

.container {
    max-width: 430px;
    margin: 0 auto;
    background: linear-gradient(160deg, #F0F9F1 0%, #E2F7E5 100%);
    min-height: 100vh;
    padding-bottom: 30px;
}

.top-user {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 14px 20px;
    gap: 10px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8CE964, #3BC16F);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(100,230,100,0.25);
}

.nickname {
    font-size: 15px;
    color: #2A2E3A;
    font-weight: 600;
}

.header {
    background: linear-gradient(135deg, #8CE964 0%, #3BC16F 100%);
    color: #fff;
    padding: 26px 24px;
    border-radius: 0 0 26px 26px;
    box-shadow: 0 6px 20px rgba(100,220,110,0.25);
    margin-bottom: 24px;
}

.header h1 {
    font-size: 26px;
    margin-bottom: 6px;
}

.header p {
    opacity: 0.95;
    font-size: 14px;
}

.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 0 20px 22px;
}

.stat-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    padding: 18px 12px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(100,200,110,0.12);
}

.stat-card .val {
    font-size: 22px;
    font-weight: 700;
    color: #28A86A;
    margin-bottom: 4px;
}

.stat-card .label {
    font-size: 12px;
    color: #555;
}

.btns {
    padding: 0 20px 18px;
}

.btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #8CE964, #3BC16F);
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 5px 15px rgba(100,210,110,0.2);
}

.btn:active {
    transform: scale(0.96);
    opacity: 0.85;
}

.btn:disabled {
    background: #ccc !important;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.btn-red {
    background: linear-gradient(135deg, #FF7575, #FF4D4F) !important;
    box-shadow: 0 5px 15px rgba(255,100,100,0.2);
}

.btn-line {
    background: rgba(255,255,255,0.7) !important;
    color: #28A86A !important;
    border: 1px solid #8CE964 !important;
}

.map-box {
    padding: 0 20px 22px;
}

#map {
    width: 100%;
    height: 240px;
    background: rgba(255,255,255,0.6);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(100,200,110,0.12);
}

.history-box {
    padding: 0 20px;
}
.history-card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(100,200,110,0.08);
}
.history-card h3 {
    font-size: 16px;
    color: #2A2E3A;
    margin-bottom: 10px;
}
.history-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid #eee;
}
.history-item:last-child {
    border-bottom: none;
}

.challenge-box {
    padding: 0 20px 12px;
}
.challenge-card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(100,200,110,0.1);
}
.challenge-card p {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 6px;
}

.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.modal-box {
    background: #fff;
    width: 330px;
    padding: 32px 26px;
    border-radius: 22px;
    max-height: 80vh;
    overflow-y: auto;
}
.modal-box h2 {
    margin-bottom: 20px;
    text-align: center;
    font-size: 20px;
}
.modal-box input,
.modal-box select {
    width: 100%;
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 14px;
    margin-bottom: 12px;
    font-size: 15px;
}

.hidden { display: none !important; }
</style>
<!-- 🔥 关键修复：Key 已替换为你的 Key -->
<script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=bfc7a09c8fcc97bbdd1197ea839c354f"></script>
</head>

<body>

<div class="container">
    <div class="top-user" id="userInfo" style="display:none;">
        <div class="avatar" id="avatar">运</div>
        <div class="nickname" id="nickname">运动达人</div>
    </div>

    <div class="header">
        <h1>运动挑战助手</h1>
        <p>保证金 · 竞赛 · 历史数据永久保存</p>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="val" id="step">0</div><div class="label">步数</div></div>
        <div class="stat-card"><div class="val" id="km">0.00</div><div class="label">公里</div></div>
        <div class="stat-card"><div class="val" id="cal">0</div><div class="label">千卡</div></div>
    </div>

    <div class="btns">
        <button class="btn" id="startBtn" disabled>开始运动（先缴保证金）</button>
        <button class="btn btn-red" id="stopBtn" disabled>结束运动</button>
        <button class="btn btn-line" id="payDeposit">缴纳保证金</button>
        <button class="btn btn-line" id="viewHistory">查看运动历史</button>
    </div>

    <div class="map-box">
        <div id="map">地图加载中...</div>
    </div>

    <div class="challenge-box">
        <div class="challenge-card">
            <p>保证金状态：<span id="depositStatus">未缴纳</span></p>
            <p>今日已运动：<span id="todayRun">0 分钟</span></p>
        </div>
    </div>

    <div class="history-box hidden" id="historyBox">
        <div class="history-card">
            <h3>今日运动记录</h3>
            <div id="todayList"></div>
        </div>
        <div class="history-card">
            <h3>本月累计</h3>
            <div id="monthList"></div>
        </div>
        <div class="history-card">
            <h3>年度累计</h3>
            <div id="yearList"></div>
        </div>
    </div>
</div>

<!-- 登录弹窗 -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h2>登录/注册</h2>
        <input type="text" id="userInput" placeholder="输入昵称">
        <button class="btn" id="loginBtn">确认登录</button>
    </div>
</div>

<!-- 支付保证金 -->
<div class="modal hidden" id="payModal">
    <div class="modal-box">
        <h2>缴纳保证金</h2>
        <select id="depositAmount">
            <option value="20">20 元</option>
            <option value="50">50 元</option>
        </select>
        <button class="btn" id="confirmPay">确认支付</button>
    </div>
</div>

<script>
// ====================== 登录 ======================
const loginModal = document.getElementById('loginModal');
const userInfo = document.getElementById('userInfo');
const avatar = document.getElementById('avatar');
const nickname = document.getElementById('nickname');

document.getElementById('loginBtn').onclick = () => {
    const name = document.getElementById('userInput').value.trim();
    if (!name) { alert('请输入昵称'); return; }
    nickname.innerText = name;
    avatar.innerText = name.charAt(0);
    loginModal.classList.add('hidden');
    userInfo.style.display = 'flex';
};

// ====================== 保证金 ======================
let hasPaid = false;
let deposit = 20;

document.getElementById('payDeposit').onclick = () => {
    document.getElementById('payModal').classList.remove('hidden');
};

document.getElementById('confirmPay').onclick = () => {
    deposit = document.getElementById('depositAmount').value;
    hasPaid = true;
    document.getElementById('payModal').classList.add('hidden');
    document.getElementById('depositStatus').innerText = `已缴 ${deposit} 元`;
    document.getElementById('startBtn').disabled = false;
    alert('保证金缴纳成功，可以开始运动！');
};

// ====================== 运动记录存储 ======================
let runHistory = JSON.parse(localStorage.getItem('runHistory')) || [];

function saveRecord(step, km, cal, duration) {
    const now = new Date();
    const record = {
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        step, km, cal, duration,
        deposit
    };
    runHistory.unshift(record);
    localStorage.setItem('runHistory', JSON.stringify(runHistory));
}

// ====================== 查看历史 ======================
document.getElementById('viewHistory').onclick = () => {
    const box = document.getElementById('historyBox');
    box.classList.toggle('hidden');
    renderHistory();
};

function renderHistory() {
    const today = new Date().toLocaleDateString();
    const thisMonth = new Date().getMonth() + 1;
    const thisYear = new Date().getFullYear();

    const todayList = document.getElementById('todayList');
    const monthList = document.getElementById('monthList');
    const yearList = document.getElementById('yearList');

    todayList.innerHTML = '';
    monthList.innerHTML = '';
    yearList.innerHTML = '';

    const todayItems = runHistory.filter(h => h.date === today);
    todayItems.forEach(h => {
        todayList.innerHTML += `
        <div class="history-item">
            <span>${h.time}</span>
            <span>${h.step}步 · ${h.km}km</span>
        </div>`;
    });

    const monthTotal = runHistory.reduce((t, h) => {
        const d = new Date(h.date);
        if (d.getMonth()+1 === thisMonth && d.getFullYear() === thisYear) {
            t.step += parseInt(h.step);
            t.km += parseFloat(h.km);
        }
        return t;
    }, {step:0, km:0});

    monthList.innerHTML = `
    <div class="history-item"><span>总步数</span><span>${monthTotal.step}</span></div>
    <div class="history-item"><span>总公里</span><span>${monthTotal.km.toFixed(2)}</span></div>`;

    const yearTotal = runHistory.reduce((t, h) => {
        const d = new Date(h.date);
        if (d.getFullYear() === thisYear) {
            t.step += parseInt(h.step);
            t.km += parseFloat(h.km);
        }
        return t;
    }, {step:0, km:0});

    yearList.innerHTML = `
    <div class="history-item"><span>总步数</span><span>${yearTotal.step}</span></div>
    <div class="history-item"><span>总公里</span><span>${yearTotal.km.toFixed(2)}</span></div>`;
}
