<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧运动挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 30px;
        }
        .header {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            padding: 20px 15px;
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
        }
        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .user-info {
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: #666;
        }

        /* 钱包 */
        .wallet-box {
            margin: 10px;
        }
        .wallet-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #3498db;
            color: #fff;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
        }
        .wallet-panel {
            background: #fff;
            border-radius: 12px;
            margin-top: 8px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        .wallet-panel.show {
            display: block;
        }
        .wallet-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
        }
        .wallet-label {
            color: #666;
        }
        .wallet-value {
            font-weight: bold;
        }
        .value-green {
            color: #27ae60;
        }
        .value-orange {
            color: #e67e22;
        }
        .wallet-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .wallet-btns button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .btn-withdraw {
            background: #3498db;
            color: #fff;
        }
        .btn-record {
            background: #f1f1f1;
            color: #333;
        }

        /* 数据 */
        .data-box {
            display: flex;
            justify-content: space-around;
            background: #fff;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .data-item .num {
            font-size: 18px;
            font-weight: bold;
        }
        .data-item .label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* 模拟地图 */
        .fake-map {
            background: #eee;
            height: 280px;
            margin: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
        }

        /* 按钮组 */
        .btn-group {
            margin: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            margin-bottom: 8px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
        }
        .btn-start {
            background: #e67e22;
            color: #fff;
        }
        .btn-stop {
            background: #e74c3c;
            color: #fff;
        }
        .btn-primary {
            background: #27ae60;
            color: #fff;
        }
        .btn-orange {
            background: #f39c12;
            color: #fff;
        }
        .btn-admin {
            background: #f39c12;
            color: #fff;
            display: none;
        }
        .btn-logout {
            background: #e74c3c;
            color: #fff;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 320px;
            border-radius: 16px;
            padding: 25px;
        }
        .modal-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .input-item {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .amount-item {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .amount-item.active {
            border-color: #27ae60;
            background: #f1f9f7;
        }
        .modal-btn {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
        .modal-close {
            text-align: center;
            margin-top: 15px;
            color: #27ae60;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>智慧运动挑战</h1>
        <p>保证金 · 轨迹记录 · 7-8分配速 · 结算</p>
    </div>

    <div class="user-info">欢迎，<span id="nickname">管理员</span></div>

    <!-- 钱包 -->
    <div class="wallet-box">
        <button class="wallet-btn" onclick="toggleWallet()">我的钱包</button>
        <div class="wallet-panel" id="walletPanel">
            <div class="wallet-item">
                <span class="wallet-label">可提现余额</span>
                <span class="wallet-value value-green" id="balance">0.00 元</span>
            </div>
            <div class="wallet-item">
                <span class="wallet-label">冻结保证金</span>
                <span class="wallet-value value-orange" id="frozen">0.00 元</span>
            </div>
            <div class="wallet-btns">
                <button class="btn-withdraw" onclick="openWithdraw()">申请提现</button>
                <button class="btn-record" onclick="showRecords()">提现记录</button>
            </div>
        </div>
    </div>

    <!-- 数据 -->
    <div class="data-box">
        <div class="data-item">
            <div class="num" id="distance">0.00</div>
            <div class="label">公里</div>
        </div>
        <div class="data-item">
            <div class="num" id="duration">00:00</div>
            <div class="label">时长</div>
        </div>
        <div class="data-item">
            <div class="num" id="pace">0'00''</div>
            <div class="label">配速</div>
        </div>
    </div>

    <!-- 模拟地图（不依赖高德，稳定可用） -->
    <div class="fake-map">轨迹地图区域（已稳定替代）</div>

    <!-- 按钮 -->
    <div class="btn-group">
        <button class="btn btn-start" onclick="startSport()">开始运动</button>
        <button class="btn btn-stop" onclick="stopSport()">结束运动</button>
        <button class="btn btn-primary" onclick="openChallenge()">发起挑战</button>
        <button class="btn btn-orange" onclick="openSettle()">结束挑战并结算</button>
        <button class="btn btn-admin" id="adminBtn">管理员后台</button>
        <button class="btn btn-logout" onclick="logout()">退出登录</button>
    </div>
</div>

<!-- 发起挑战弹窗 -->
<div class="modal" id="challengeModal">
    <div class="modal-content">
        <div class="modal-title">发起挑战</div>
        <div class="amount-item" onclick="selectAmt(20)">20 元</div>
        <div class="amount-item" onclick="selectAmt(50)">50 元</div>
        <div class="amount-item" onclick="selectAmt(100)">100 元</div>
        <input class="input-item" id="dayInput" placeholder="挑战天数 ≥7" type="number">
        <button class="modal-btn" onclick="createChallenge()">确认发起</button>
        <div class="modal-close" onclick="closeModal()">取消</div>
    </div>
</div>

<!-- 结算弹窗 -->
<div class="modal" id="settleModal">
    <div class="modal-content">
        <div class="modal-title">结算挑战</div>
        <div style="padding:10px;text-align:center;" id="settleInfo"></div>
        <button class="modal-btn" onclick="doSettle()">确认结算</button>
        <div class="modal-close" onclick="closeModal()">取消</div>
    </div>
</div>

<!-- 提现弹窗 -->
<div class="modal" id="withdrawModal">
    <div class="modal-content">
        <div class="modal-title">申请提现</div>
        <input class="input-item" id="withdrawAmt" placeholder="输入提现金额" type="number">
        <button class="modal-btn" onclick="withdraw()">提交提现</button>
        <div class="modal-close" onclick="closeModal()">取消</div>
    </div>
</div>

<script>
// ==================== 数据 ====================
let user = { name: "管理员", phone: "13577800902" };
let wallet = { balance: 0, frozen: 0, records: [] };
let challenge = null;
let selectAmt = 0;

// 运动
let isRunning = false;
let startTime = 0;
let timer = null;
let distance = 0;

// ==================== 钱包 ====================
function toggleWallet() {
    let panel = document.getElementById("walletPanel");
    panel.classList.toggle("show");
}

// ==================== 运动 ====================
function startSport() {
    if (isRunning) return;
    isRunning = true;
    startTime = Date.now();
    timer = setInterval(updateSport, 1000);
    alert("运动已开始");
}

function stopSport() {
    if (!isRunning) return;
    isRunning = false;
    clearInterval(timer);
    alert("运动已结束");
}

function updateSport() {
    let useTime = (Date.now() - startTime) / 1000;
    let min = Math.floor(useTime / 60);
    let sec = Math.floor(useTime % 60);
    let duration = String(min).padStart(2, '0') + ":" + String(sec).padStart(2, '0');

    distance += 0.005;
    let pace = 8;

    document.getElementById("duration").innerText = duration;
    document.getElementById("distance").innerText = distance.toFixed(2);
    document.getElementById("pace").innerText = pace.toFixed(1) + "'";

    if (pace < 7 || pace > 8) {
        alert("请保持 7～8 分钟/公里配速");
    }
}

// ==================== 挑战 ====================
function openChallenge() {
    document.getElementById("challengeModal").classList.add("show");
}

function selectAmt(amt) {
    selectAmt = amt;
    let items = document.querySelectorAll(".amount-item");
    items.forEach(i => i.classList.remove("active"));
    event.target.classList.add("active");
}

function createChallenge() {
    let days = parseInt(document.getElementById("dayInput").value);
    if (!selectAmt || !days || days < 7) {
        alert("请选择金额，天数≥7");
        return;
    }
    wallet.frozen += selectAmt;
    challenge = { amount: selectAmt, days: days, status: "进行中" };
    updateUI();
    closeModal();
    alert("挑战已发起，保证金已冻结");
}

// ==================== 结算 ====================
function openSettle() {
    if (!challenge || challenge.status !== "进行中") {
        alert("暂无进行中的挑战");
        return;
    }
    let info = `保证金：${challenge.amount} 元`;
    document.getElementById("settleInfo").innerText = info;
    document.getElementById("settleModal").classList.add("show");
}

function doSettle() {
    wallet.balance += challenge.amount;
    wallet.frozen -= challenge.amount;
    challenge.status = "已结算";
    updateUI();
    closeModal();
    alert("结算成功，金额已退回余额");
}

// ==================== 提现 ====================
function openWithdraw() {
    document.getElementById("withdrawModal").classList.add("show");
}

function withdraw() {
    let amt = parseFloat(document.getElementById("withdrawAmt").value);
    if (!amt || amt <= 0 || amt > wallet.balance) {
        alert("金额不正确");
        return;
    }
    wallet.balance -= amt;
    wallet.records.push({ amt: amt, time: new Date().toLocaleString() });
    updateUI();
    closeModal();
    alert("提现申请已提交");
}

function showRecords() {
    if (wallet.records.length === 0) {
        alert("暂无记录");
        return;
    }
    alert(JSON.stringify(wallet.records, null, 2));
}

// ==================== 工具 ====================
function updateUI() {
    document.getElementById("balance").innerText = wallet.balance.toFixed(2) + " 元";
    document.getElementById("frozen").innerText = wallet.frozen.toFixed(2) + " 元";
}

function closeModal() {
    document.querySelectorAll(".modal").forEach(m => m.classList.remove("show"));
}

function logout() {
    alert("已退出");
    location.reload();
}

// 初始化
updateUI();
document.getElementById("adminBtn").style.display = "block";
</script>

</body>
</html>
