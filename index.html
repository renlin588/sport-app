<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧运动挑战助手</title>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=bfc7a09c8fcc97bbdd1197ea839c354f"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f5f5f5; }
        .app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .header { background: linear-gradient(135deg, #28A86A, #8CE964); color: white; padding: 20px 15px; text-align: center; }
        .header h1 { font-size: 22px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .data-card { display: flex; justify-content: space-around; padding: 15px 0; background: #f8f8f8; margin: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .data-item { text-align: center; }
        .data-value { font-size: 20px; font-weight: bold; color: #28A86A; margin-bottom: 3px; }
        .data-label { font-size: 11px; color: #666; }
        .map-container { height: 250px; margin: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; }
        .map-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; z-index: 10; }
        .btn-group { padding: 0 10px 20px; }
        .btn { display: block; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #8CE964, #3BC16F); color: white; }
        .btn-secondary { background: #f1f1f1; color: #333; }
        
        /* 登录弹窗样式 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
        }
        .login-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8CE964, #3BC16F);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>运动挑战助手</h1>
            <p>保证金 · 竞赛 · 历史数据永久保存</p>
        </div>

        <div class="data-card">
            <div class="data-item">
                <div class="data-value" id="stepCount">0</div>
                <div class="data-label">步数</div>
            </div>
            <div class="data-item">
                <div class="data-value" id="distance">0.00</div>
                <div class="data-label">公里</div>
            </div>
            <div class="data-item">
                <div class="data-value" id="calorie">0</div>
                <div class="data-label">千卡</div>
            </div>
        </div>

        <div class="map-container">
            <div class="map-loading" id="mapLoading">地图加载中...</div>
            <div id="map" style="width:100%;height:100%;"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="startBtn">开始运动</button>
            <button class="btn btn-secondary" id="historyBtn">运动历史</button>
            <button class="btn btn-secondary" id="inviteBtn">邀请好友</button>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>登录/注册</h2>
            <input type="text" class="login-input" id="username" placeholder="请输入昵称" value="任林">
            <button class="login-btn" id="loginBtn">确认登录</button>
        </div>
    </div>

    <script>
        // 全局变量
        let map = null;
        let polyline = null;
        let watchId = null;
        let isTracking = false;
        let trackPoints = [];
        let totalDistance = 0;
        let totalSteps = 0;
        let totalCalorie = 0;

        // DOM 元素
        const loginModal = document.getElementById('loginModal');
        const loginBtn = document.getElementById('loginBtn');
        const mapLoading = document.getElementById('mapLoading');
        const startBtn = document.getElementById('startBtn');
        const stepCountEl = document.getElementById('stepCount');
        const distanceEl = document.getElementById('distance');
        const calorieEl = document.getElementById('calorie');

        // 登录逻辑 - 核心修复点：点击后隐藏弹窗
        loginBtn.onclick = function() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                alert('请输入昵称！');
                return;
            }
            // 隐藏登录弹窗
            loginModal.style.display = 'none';
            // 初始化地图
            initMap();
        };

        // 初始化高德地图
        function initMap() {
            map = new AMap.Map('map', {
                zoom: 16,
                resizeEnable: true
            });

            // 获取当前定位
            map.plugin('AMap.Geolocation', function() {
                const geolocation = new AMap.Geolocation({
                    enableHighAccuracy: true,
                    timeout: 10000
                });

                geolocation.getCurrentPosition(function(status, result) {
                    mapLoading.style.display = 'none'; // 隐藏加载提示
                    if (status === 'complete') {
                        const lnglat = [result.position.lng, result.position.lat];
                        map.setCenter(lnglat);
                        // 添加起点标记
                        addMarker(lnglat, '起点');
                    } else {
                        alert('定位失败，请检查定位权限！');
                    }
                });
            });
        }

        // 添加地图标记
        function addMarker(lnglat, title) {
            const marker = new AMap.Marker({
                position: lnglat,
                title: title,
                icon: new AMap.Icon({
                    size: new AMap.Size(30, 30),
                    image: 'https://a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-red.png',
                    imageSize: new AMap.Size(30, 30)
                })
            });
            marker.addTo(map);
        }

        // 运动轨迹绘制
        function drawTrack() {
            if (polyline) {
                polyline.remove();
            }
            polyline = new AMap.Polyline({
                path: trackPoints,
                strokeColor: '#28A86A',
                strokeWeight: 6,
                strokeOpacity: 0.8
            });
            polyline.addTo(map);
            // 调整地图视野
            map.setFitView([polyline]);
        }

        // 开始/停止运动
        startBtn.onclick = function() {
            if (!isTracking) {
                // 开始运动
                startTracking();
                startBtn.textContent = '结束运动';
                startBtn.style.background = 'linear-gradient(135deg, #ff6b6b, #ff4d4d)';
            } else {
                // 结束运动
                stopTracking();
                startBtn.textContent = '开始运动';
                startBtn.style.background = 'linear-gradient(135deg, #8CE964, #3BC16F)';
            }
        };

        // 开始定位追踪
        function startTracking() {
            isTracking = true;
            trackPoints = [];
            totalDistance = 0;
            totalSteps = 0;
            totalCalorie = 0;

            // 模拟步数和定位更新（实际项目需对接传感器）
            watchId = setInterval(function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(pos) {
                        const lnglat = [pos.coords.longitude, pos.coords.latitude];
                        trackPoints.push(lnglat);
                        
                        // 模拟计算距离（简化版）
                        if (trackPoints.length > 1) {
                            const last = trackPoints[trackPoints.length - 2];
                            totalDistance += AMap.GeometryUtil.distance(last, lnglat) / 1000;
                        }
                        
                        // 模拟步数和卡路里
                        totalSteps += Math.floor(Math.random() * 10) + 5;
                        totalCalorie = (totalDistance * 60).toFixed(0);

                        // 更新UI
                        stepCountEl.textContent = totalSteps;
                        distanceEl.textContent = totalDistance.toFixed(2);
                        calorieEl.textContent = totalCalorie;

                        // 绘制轨迹
                        drawTrack();
                    });
                }
            }, 2000);
        }

        // 停止定位追踪
        function stopTracking() {
            isTracking = false;
            clearInterval(watchId);
            // 添加终点标记
            if (trackPoints.length > 0) {
                addMarker(trackPoints[trackPoints.length - 1], '终点');
                alert('运动结束！\n距离：' + totalDistance.toFixed(2) + '公里\n步数：' + totalSteps + '\n消耗：' + totalCalorie + '千卡');
            }
        }
    </script>
</body>
</html>
